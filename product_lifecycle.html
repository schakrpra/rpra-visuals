<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Lifecycle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#eef0f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .frame{width:720px;height:720px;position:relative;background:#F9F9EF;border:1.5px solid #dde1e6;border-radius:16px;overflow:hidden}
  .stage{position:relative;width:100%;height:100%}

  /* Node container — positioned by center point */
  .node{position:absolute;z-index:3;cursor:pointer;transform:translate(-50%,-50%);transition:transform .2s}
  .node:hover,.node.active{transform:translate(-50%,-50%) scale(1.12)}

  .node-icon{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.13);position:relative;transition:box-shadow .2s}
  .node:hover .node-icon,.node.active .node-icon{box-shadow:0 5px 20px rgba(0,0,0,.2)}
  .node-icon svg{width:30px;height:30px}

  /* Label — absolutely positioned, shifted per node via inline style */
  .node-label{position:absolute;font-family:'Outfit',sans-serif;font-weight:600;font-size:12.5px;color:#002C44;white-space:nowrap}

  .node.active .node-icon::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:2.5px solid var(--clr);animation:ring 1.2s ease-out infinite}
  @keyframes ring{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.35)}}

  .tooltip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:265px;background:#fff;border-radius:14px;box-shadow:0 10px 36px rgba(0,44,68,.18);padding:22px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:20}
  .tooltip.visible{opacity:1;pointer-events:auto}
  .tooltip-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:#002C44;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .tooltip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .tooltip-body{font-size:13px;line-height:1.55;color:#3d4f5f}
  .tooltip-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:#98a2b3;cursor:pointer}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">

    <!-- Arrows -->
    <svg viewBox="0 0 720 720" style="position:absolute;inset:0;z-index:1;pointer-events:none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7Z" fill="#002C44"/></marker>
        <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7Z" fill="#62BCD1"/></marker>
      </defs>

      <!-- MAIN CYCLE (solid, dark navy) -->
      <!-- Supply(220,220) → Sale(390,155) -->
      <path d="M252,210 C300,172 348,156 372,154" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Sale(390,155) → Use(530,255) -->
      <path d="M420,164 C458,178 498,210 520,242" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Use(530,255) → Drop-off(555,430) -->
      <path d="M545,290 C558,340 560,388 558,400" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Drop-off(555,430) → Collection(430,560) -->
      <path d="M542,460 C522,502 472,546 448,556" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Collection(430,560) → Processing(255,540) -->
      <path d="M398,566 C348,572 302,558 278,546" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Processing(255,540) → Recycling/Recovery(160,385) -->
      <path d="M238,520 C208,485 178,438 168,412" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Recycling/Recovery(160,385) → Supply(220,220) -->
      <path d="M168,355 C175,305 192,258 210,238" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>

      <!-- SECONDARY (dashed, light teal) -->
      <!-- Raw Materials(90,135) → Supply(220,220) -->
      <path d="M120,148 C150,168 185,195 205,212" fill="none" stroke="#62BCD1" stroke-width="1.6" stroke-dasharray="6,5" marker-end="url(#ag)"/>
      <!-- Use → Landfill -->
      <path d="M558,268 C578,274 602,278 618,280" fill="none" stroke="#62BCD1" stroke-width="1.6" stroke-dasharray="6,5" marker-end="url(#ag)"/>
    </svg>

    <!-- ===== NODES ===== -->
    <!-- Circle: center(360,370), r=210, 7 nodes at 51.43° intervals starting 315° -->

    <!-- RAW MATERIALS — off circle, upper-left -->
    <div class="node" style="left:90px;top:135px;--clr:#002C44" data-id="raw">
      <div class="node-icon" style="background:#002C44">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Raw Materials</span>
    </div>

    <!-- SUPPLY — upper-left of circle — MUSTARD -->
    <div class="node" style="left:220px;top:220px;--clr:#FEBC11" data-id="supply">
      <div class="node-icon" style="background:#FEBC11">
        <svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Supply</span>
    </div>

    <!-- SALE — top of circle — MUSTARD -->
    <div class="node" style="left:390px;top:155px;--clr:#FEBC11" data-id="sale">
      <div class="node-icon" style="background:#FEBC11">
        <svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1" fill="#002C44"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Sale</span>
    </div>

    <!-- USE — right of circle — MUSTARD -->
    <div class="node" style="left:530px;top:255px;--clr:#FEBC11" data-id="use">
      <div class="node-icon" style="background:#FEBC11">
        <svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Use</span>
    </div>

    <!-- DROP-OFF — right of circle — BLUE -->
    <div class="node" style="left:555px;top:430px;--clr:#324AD9" data-id="dropoff">
      <div class="node-icon" style="background:#324AD9">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><rect x="4" y="17" width="16" height="4" rx="1"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Drop-off</span>
    </div>

    <!-- COLLECTION — bottom-right — BLUE -->
    <div class="node" style="left:430px;top:560px;--clr:#324AD9" data-id="collection">
      <div class="node-icon" style="background:#324AD9">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M3 6h18l-2 13H5L3 6z"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M10 11v4"/><path d="M14 11v4"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Collection</span>
    </div>

    <!-- PROCESSING — bottom-left — TEAL -->
    <div class="node" style="left:255px;top:540px;--clr:#198185" data-id="processing">
      <div class="node-icon" style="background:#198185">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Processing</span>
    </div>

    <!-- RECYCLING / RECOVERY — left of circle — TEAL -->
    <div class="node" style="left:160px;top:385px;--clr:#198185" data-id="recycling">
      <div class="node-icon" style="background:#198185">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/><path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/></svg>
      </div>
      <span class="node-label" style="top:78px;right:8px;text-align:right">Recycling /<br>Recovery</span>
    </div>

    <!-- LANDFILL — off circle, right side -->
    <div class="node" style="left:640px;top:288px;--clr:#62BCD1" data-id="landfill">
      <div class="node-icon" style="background:#62BCD1">
        <svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><path d="M3 21h18"/><path d="M5 21V11l7-7 7 7v10"/><path d="M9 21v-4h6v4"/></svg>
      </div>
      <span class="node-label" style="top:78px;left:50%;transform:translateX(-50%)">Landfill</span>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
      <button class="tooltip-close" id="tc">&times;</button>
      <div class="tooltip-title"><span class="tooltip-dot" id="td"></span><span id="tt"></span></div>
      <div class="tooltip-body" id="tb"></div>
    </div>
  </div>
</div>

<script>
const info = {
  raw: {
    title: "Raw Materials",
    color: "#002C44",
    text: "Natural resources are extracted and processed into base materials. This is the starting point of the product lifecycle before materials enter the supply chain."
  },
  supply: {
    title: "Supply",
    color: "#FEBC11",
    text: "Products are supplied into the Ontario market. Producers report the quantity of products they supply, which determines their obligations under Ontario's producer responsibility framework."
  },
  sale: {
    title: "Sale",
    color: "#FEBC11",
    text: "Products are sold to consumers and businesses through retail and wholesale channels. This is the point at which producer responsibility obligations are typically triggered."
  },
  use: {
    title: "Use",
    color: "#FEBC11",
    text: "Consumers and businesses use products during their functional lifespan. Product design and durability influence how long this phase lasts before end-of-life."
  },
  dropoff: {
    title: "Drop-off",
    color: "#324AD9",
    text: "End-of-life products are brought to designated drop-off locations by consumers. These include municipal depots, retail take-back locations, and collection events."
  },
  collection: {
    title: "Collection",
    color: "#324AD9",
    text: "Dropped-off products are collected and consolidated by Producer Responsibility Organizations (PROs) through depot, curbside, retail, and event-based programs."
  },
  processing: {
    title: "Processing",
    color: "#198185",
    text: "Collected materials are sorted, dismantled, and prepared for recycling or recovery. This stage separates recoverable materials from residual waste."
  },
  recycling: {
    title: "Recycling / Recovery",
    color: "#198185",
    text: "Materials are converted back into secondary raw materials or recovered for energy. Recovery rates measure how much collected material is successfully diverted from landfill."
  },
  landfill: {
    title: "Landfill",
    color: "#62BCD1",
    text: "Products not collected, or residual material that cannot be recycled, end up in landfill. Reducing this flow is a core objective of extended producer responsibility."
  }
};

const tooltip = document.getElementById('tooltip');
const tt = document.getElementById('tt');
const tb = document.getElementById('tb');
const td = document.getElementById('td');
let active = null;

document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', e => {
    e.stopPropagation();
    const d = info[n.dataset.id];
    if (active === n) { cl(); return; }
    if (active) active.classList.remove('active');
    active = n;
    n.classList.add('active');
    tt.textContent = d.title;
    tb.textContent = d.text;
    td.style.background = d.color;
    tooltip.classList.add('visible');
  });
});

document.getElementById('tc').addEventListener('click', e => { e.stopPropagation(); cl(); });
document.addEventListener('click', cl);

function cl() {
  tooltip.classList.remove('visible');
  if (active) { active.classList.remove('active'); active = null; }
}
</script>
</body>
</html>
