<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Lifecycle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#eef0f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .frame{width:680px;height:680px;position:relative;background:#F9F9EF;border:1.5px solid #dde1e6;border-radius:16px;overflow:hidden}
  .stage{position:relative;width:100%;height:100%}
  .node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;z-index:3;transition:transform .2s;transform:translate(-50%,-50%)}
  .node:hover,.node.active{transform:translate(-50%,-50%) scale(1.12)}
  .node-icon{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.13);position:relative;transition:box-shadow .2s}
  .node:hover .node-icon,.node.active .node-icon{box-shadow:0 5px 20px rgba(0,0,0,.2)}
  .node-icon svg{width:30px;height:30px}
  .node-label{font-family:'Outfit',sans-serif;font-weight:600;font-size:12.5px;color:#002C44;white-space:nowrap}
  .node.active .node-icon::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:2.5px solid var(--clr);animation:ring 1.2s ease-out infinite}
  @keyframes ring{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.35)}}
  .tooltip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:265px;background:#fff;border-radius:14px;box-shadow:0 10px 36px rgba(0,44,68,.18);padding:22px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:20}
  .tooltip.visible{opacity:1;pointer-events:auto}
  .tooltip-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:#002C44;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .tooltip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .tooltip-body{font-size:13px;line-height:1.55;color:#3d4f5f}
  .tooltip-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:#98a2b3;cursor:pointer}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">
    <!-- Arrows -->
    <svg viewBox="0 0 680 680" style="position:absolute;inset:0;z-index:1;pointer-events:none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7Z" fill="#002C44"/></marker>
        <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7Z" fill="#62BCD1"/></marker>
      </defs>

      <!-- Main cycle arrows (solid, dark navy) -->
      <!-- Supply(199,199) → Manufacture(362,141) -->
      <path d="M232,192 C275,160 320,145 345,142" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Manufacture(362,141) → Sale(509,234) -->
      <path d="M390,150 C430,160 475,195 498,225" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Sale(509,234) → Use(529,406) -->
      <path d="M520,268 C535,310 538,360 533,395" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Use(529,406) → Collection(406,529) -->
      <path d="M518,435 C498,478 455,515 420,528" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Collection(406,529) → Reuse(234,510) -->
      <path d="M375,535 C330,540 285,530 258,518" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Reuse(234,510) → Recycling(141,363) -->
      <path d="M218,492 C188,460 158,415 148,388" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>
      <!-- Recycling(141,363) → Supply(199,199) -->
      <path d="M148,335 C155,290 172,242 190,218" fill="none" stroke="#002C44" stroke-width="2.2" marker-end="url(#a)"/>

      <!-- Secondary paths (dashed, light blue) -->
      <!-- Raw Materials(80,120) → Supply(199,199) -->
      <path d="M108,132 C135,148 162,170 182,188" fill="none" stroke="#62BCD1" stroke-width="1.6" stroke-dasharray="6,5" marker-end="url(#ag)"/>
      <!-- Recycling → Manufacture (inner shortcut) -->
      <path d="M170,348 C230,280 310,200 348,158" fill="none" stroke="#62BCD1" stroke-width="1.5" stroke-dasharray="6,5" marker-end="url(#ag)"/>
      <!-- Use → Landfill -->
      <path d="M548,420 C565,445 580,470 590,490" fill="none" stroke="#62BCD1" stroke-width="1.5" stroke-dasharray="6,5" marker-end="url(#ag)"/>
    </svg>

    <!-- Nodes — mathematically placed on r=200 circle, center (340,340) -->
    <!-- 7 nodes at 51.43° intervals starting at 315° clockwise from 12 o'clock -->

    <!-- Raw Materials — OFF circle, upper-left corner -->
    <div class="node" style="left:80px;top:120px;--clr:#002C44" data-id="raw">
      <div class="node-icon" style="background:#002C44"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="node-label">Raw Materials</span>
    </div>

    <!-- Supply — 315° -->
    <div class="node" style="left:199px;top:199px;--clr:#FEBC11" data-id="supply">
      <div class="node-icon" style="background:#FEBC11"><svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
      <span class="node-label">Supply</span>
    </div>

    <!-- Manufacture — 6.4° -->
    <div class="node" style="left:362px;top:141px;--clr:#FEBC11" data-id="manufacture">
      <div class="node-icon" style="background:#FEBC11"><svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><path d="M2 20h20"/><path d="M5 20V10l4 4V10l4 4V4l6 8v8"/></svg></div>
      <span class="node-label">Manufacture</span>
    </div>

    <!-- Sale — 57.9° -->
    <div class="node" style="left:509px;top:234px;--clr:#324AD9" data-id="sale">
      <div class="node-icon" style="background:#324AD9"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1" fill="#F9F9EF"/></svg></div>
      <span class="node-label">Sale</span>
    </div>

    <!-- Use — 109.3° -->
    <div class="node" style="left:529px;top:406px;--clr:#324AD9" data-id="use">
      <div class="node-icon" style="background:#324AD9"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg></div>
      <span class="node-label">Use</span>
    </div>

    <!-- Collection — 160.7° -->
    <div class="node" style="left:406px;top:529px;--clr:#198185" data-id="collection">
      <div class="node-icon" style="background:#198185"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M3 6h18l-2 13H5L3 6z"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M10 11v4"/><path d="M14 11v4"/></svg></div>
      <span class="node-label">Collection</span>
    </div>

    <!-- Reuse / Refurbish — 212.1° -->
    <div class="node" style="left:234px;top:510px;--clr:#198185" data-id="reuse">
      <div class="node-icon" style="background:#198185"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94L6.7 20.2a2.12 2.12 0 01-3-3l6.83-6.83a6 6 0 017.94-7.94L14.7 6.3z"/></svg></div>
      <span class="node-label">Reuse / Refurbish</span>
    </div>

    <!-- Recycling — 263.4° -->
    <div class="node" style="left:141px;top:363px;--clr:#198185" data-id="recycling">
      <div class="node-icon" style="background:#198185"><svg viewBox="0 0 24 24" fill="none" stroke="#F9F9EF" stroke-width="2" stroke-linecap="round"><path d="M7 19H4.815a1.83 1.83 0 01-1.57-.881 1.785 1.785 0 01-.004-1.784L7.196 9.5"/><path d="M11 19h8.203a1.83 1.83 0 001.556-.89 1.784 1.784 0 00-.005-1.78L16.796 9.5"/><path d="M12 2l3.959 6.837"/><path d="M12 2L8.041 8.837"/><path d="M4 15l3-1-1 3"/><path d="M20 15l-3-1 1 3"/></svg></div>
      <span class="node-label">Recycling</span>
    </div>

    <!-- Landfill — OFF circle, lower-right -->
    <div class="node" style="left:600px;top:520px;--clr:#62BCD1" data-id="landfill">
      <div class="node-icon" style="background:#62BCD1"><svg viewBox="0 0 24 24" fill="none" stroke="#002C44" stroke-width="2" stroke-linecap="round"><path d="M3 21h18"/><path d="M5 21V11l7-7 7 7v10"/><path d="M9 21v-4h6v4"/></svg></div>
      <span class="node-label">Landfill</span>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
      <button class="tooltip-close" id="tc">&times;</button>
      <div class="tooltip-title"><span class="tooltip-dot" id="td"></span><span id="tt"></span></div>
      <div class="tooltip-body" id="tb"></div>
    </div>
  </div>
</div>
<script>
const info={raw:{title:"Raw Materials",color:"#002C44",text:"Natural resources are extracted and processed into base materials used in manufacturing. This is the starting point of the product lifecycle."},supply:{title:"Supply",color:"#FEBC11",text:"Processed materials are transported to manufacturing facilities. Producers report the quantity of products supplied into Ontario."},manufacture:{title:"Manufacture",color:"#FEBC11",text:"Raw materials are transformed into finished products. Manufacturing processes determine a product's material composition, recyclability, and end-of-life options."},sale:{title:"Sale",color:"#324AD9",text:"Finished products enter the Ontario market through retail and wholesale channels. This is the point at which producer responsibility obligations are typically triggered."},use:{title:"Use",color:"#324AD9",text:"Consumers and businesses use products during their functional lifespan. Product design and durability influence how long this phase lasts before end-of-life."},collection:{title:"Collection",color:"#198185",text:"End-of-life products are collected through depot, curbside, retail take-back, and event-based programs operated by Producer Responsibility Organizations (PROs)."},reuse:{title:"Reuse / Refurbish",color:"#198185",text:"Collected products that still have functional value are repaired, refurbished, or redistributed, extending their useful life and diverting material from recycling or disposal."},recycling:{title:"Recycling",color:"#198185",text:"Materials are sorted, processed, and converted back into secondary raw materials. Recovery rates measure how much collected material is successfully recycled."},landfill:{title:"Landfill",color:"#62BCD1",text:"Products not collected, or residual material that cannot be recycled, end up in landfill. Reducing this flow is a core objective of extended producer responsibility."}};
const tooltip=document.getElementById('tooltip'),tt=document.getElementById('tt'),tb=document.getElementById('tb'),td=document.getElementById('td');
let active=null;
document.querySelectorAll('.node').forEach(n=>{n.addEventListener('click',e=>{e.stopPropagation();const d=info[n.dataset.id];if(active===n){cl();return}if(active)active.classList.remove('active');active=n;n.classList.add('active');tt.textContent=d.title;tb.textContent=d.text;td.style.background=d.color;tooltip.classList.add('visible')})});
document.getElementById('tc').addEventListener('click',e=>{e.stopPropagation();cl()});
document.addEventListener('click',cl);
function cl(){tooltip.classList.remove('visible');if(active){active.classList.remove('active');active=null}}
</script>
</body>
</html>
